services:
  postgres:
    image: postgres:16-alpine
    container_name: football-scout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_scout
    ports:
      - "5433:5432"
    volumes:
      - football_scout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_scout"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  football_scout_pgdata:
